<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TORQ CYMRU | SOVEREIGN v16.72</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0a0a0a">
    <link rel="apple-touch-icon" href="icon.png">

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        :root { --red: #C8102E; --green: #00B140; --blue: #007BFF; --yellow: #FFD700; --dark: #0a0a0a; --panel: #161616; --border: #2a2a2a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: #eee; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        #startup-screen { position: fixed; inset: 0; background: var(--dark); z-index: 99999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .van-btn { width: 85%; max-width: 300px; padding: 18px; margin: 8px; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 12px; font-weight: bold; text-align: center; cursor: pointer; }
        header { position: sticky; top: 0; background: var(--dark); z-index: 1000; padding: 12px 15px; border-bottom: 2px solid var(--red); display: flex; justify-content: space-between; align-items: center; min-height: 60px; box-sizing: border-box; }
        #main-ui { max-width: 1000px; margin: 0 auto; background: var(--panel); padding: 15px; min-height: 95vh; display:none; }
        .master-only { display: none !important; } .is-master .master-only { display: block !important; }
        .section-title { color: var(--red); text-transform: uppercase; font-size: 0.7rem; border-bottom: 1px solid var(--border); padding-bottom: 5px; margin: 20px 0 10px; font-weight: 800; }
        .job-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
        .job-card { background: #1f1f1f; border: 1px solid var(--border); padding: 12px; border-radius: 8px; display: flex; align-items: center; font-size: 0.8rem; cursor: pointer; }
        .job-card input { margin-right: 10px; width: 18px; height: 18px; accent-color: var(--red); }
        input, select, textarea { width: 100%; padding: 12px; background: #111; border: 1px solid var(--border); border-radius: 8px; color: #fff; font-size: 16px; margin-bottom: 10px; box-sizing: border-box; }
        .upper { text-transform: uppercase !important; }
        .tabs { display: flex; gap: 5px; margin: 15px 0; background: #111; padding: 5px; border-radius: 10px; }
        .tab { flex: 1; padding: 12px; color: #666; border-radius: 8px; text-align: center; cursor: pointer; font-weight: bold; font-size: 0.75rem; }
        .tab.active { background: var(--red); color: #fff; }
        .view-panel { display: none; } .view-panel.active { display: block !important; }
        .job-item { padding: 15px; background: #111; margin-bottom: 10px; border-radius: 12px; border-left: 8px solid #333; cursor: pointer; position: relative; }
        .status-badge { font-size: 0.55rem; padding: 2px 6px; border-radius: 4px; font-weight: 900; margin-left: 8px; vertical-align: middle; }
        .date-tag { font-size: 0.55rem; background: #333; color: var(--yellow); padding: 2px 6px; border-radius: 4px; margin-left: 5px; font-weight: bold; }
        .badge-QUOTE { background: var(--red); color: white; } .status-PAID { border-left-color: var(--green); }
        .details-pane { display: none; padding-top: 15px; border-top: 1px solid #222; margin-top: 10px; } 
        .is-open .details-pane { display: block; }
        button { width: 100%; padding: 12px; border-radius: 10px; font-weight: bold; border: none; text-transform: uppercase; cursor: pointer; margin-bottom: 8px; font-size: 0.7rem; color: #fff; }
        .btn-green { background: var(--green); } .btn-blue { background: var(--blue); } .btn-red { background: var(--red); } .btn-yellow { background: var(--yellow); color: #000; } .btn-gray { background: #444; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100000; display: none; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: #1a1a1a; padding: 25px; border-radius: 15px; width: 100%; max-width: 400px; border: 1px solid #333; max-height: 90vh; overflow-y: auto; }
        .breakdown-row { display: flex; justify-content: space-between; font-size: 0.75rem; margin-bottom: 3px; border-bottom: 1px solid #222; padding-bottom: 2px; }
        .stats-header { background: #000; border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 15px; display: flex; justify-content: space-around; text-align: center; }
        .stat-box strong { font-size: 1.1rem; color: var(--green); }
        .van-tag { font-size: 0.55rem; background: var(--blue); color: white; padding: 2px 6px; border-radius: 4px; margin-left: 5px; font-weight: bold; }
    </style>
</head>
<body id="appBody">

<div id="startup-screen">
    <h2 style="font-style:italic; letter-spacing:2px; color:#fff;">TORQ CYMRU</h2>
    <div class="van-btn" onclick="startApp('Mechanic 1')">MECHANIC 1</div>
    <div class="van-btn" onclick="startApp('Mechanic 2')">MECHANIC 2</div>
    <div class="van-btn" onclick="startApp('Tyres')">TYRES</div>
    <div class="van-btn" onclick="startApp('Locksmith')">LOCKSMITH</div>
    <div class="van-btn" onclick="startApp('Recovery')">RECOVERY</div>
    <div class="van-btn master-btn" style="border-color:var(--red); color:var(--red); margin-top:20px;" onclick="initMasterLogin()">MASTER CONTROL</div>
</div>

<header id="appHeader" style="display:none;">
    <div onclick="triggerLogoUpload()" style="cursor:pointer; display: flex; align-items: center; gap: 12px;">
        <img id="appLogo" src="" style="display:none; max-height:40px; width:auto; border-radius:4px;">
        <h3 id="logoText" style="margin:0; font-style:italic; letter-spacing:1px; color:#fff;">TORQ CYMRU</h3>
    </div>
    <div class="master-only" style="cursor:pointer; font-size:22px;" onclick="openCog()">⚙️</div>
</header>

<div id="main-ui">
    <div class="tabs">
        <div class="tab master-only active" id="tab-build" onclick="switchTab('build')">BUILDER</div>
        <div class="tab" id="tab-active" onclick="switchTab('active')">BOARD</div>
        <div class="tab master-only" id="tab-history" onclick="switchTab('history')">HISTORY</div>
    </div>

    <div id="panel-build" class="view-panel active">
        <div class="section-title">Pricing Factors</div>
        <div style="display:grid; grid-template-columns: 1.5fr 1fr; gap:8px;">
            <select id="mUsage" onchange="calc()"><option value="1">No VAT</option><option value="1.1">10% VAT</option><option value="1.2">20% VAT</option></select>
            <select id="mSize" onchange="calc()"><option value="1.0">Small Car</option><option value="1.1">Medium Car</option><option value="1.2">Large SUV</option><option value="1.1">Small Van</option><option value="1.25">Med Van</option><option value="1.4">Large Van</option></select>
        </div>
        <select id="mTier" onchange="calc()" style="margin-top:8px;"><option value="1.0">Standard Rate</option><option value="1.1">Premium Rate</option><option value="1.2">Performance Rate</option></select>
        <div class="section-title">Client & Vehicle</div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;"><input type="text" id="mCust" placeholder="Name"><input type="tel" id="mPhone" placeholder="Phone"></div>
        <input type="email" id="mEmail" placeholder="Client Email">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;"><input type="text" id="mReg" class="upper" placeholder="REG"><input type="text" id="mMake" placeholder="Make/Model"></div>
        <input type="text" id="mPcode" class="upper" placeholder="POSTCODE" oninput="handleDistance()">
        <textarea id="mAddr" placeholder="Work Address"></textarea>
        <textarea id="mOfficeNotes" placeholder="Office Notes for Van..."></textarea>
        <div class="section-title">Work List</div>
        <div class="job-grid" id="mGrid"></div>
        <div class="section-title">Custom Job</div>
        <div style="display:grid; grid-template-columns: 2fr 1fr; gap:8px;"><input type="text" id="mCustomJob" placeholder="Description"><input type="number" id="mCustomHours" placeholder="Hrs" oninput="calc()"></div>
        <div class="section-title">Surcharges</div>
        <div class="job-grid">
            <label class="job-card"><input type="checkbox" id="mAcc" onchange="calc()"> Access Fee</label>
            <label class="job-card"><input type="checkbox" id="mOOH" onchange="calc()"> OOH Fee</label>
            <label class="job-card"><input type="checkbox" id="mEm" onchange="calc()"> Emergency Fee</label>
            <label class="job-card"><input type="checkbox" id="mEnv" onchange="calc()"> Env Dis Fee</label>
        </div>
        <input type="number" id="mParts" placeholder="Parts Cost £" oninput="calc()" style="margin-top:15px;">
        <div style="display:flex; gap:5px;"><input type="number" id="mDiscount" placeholder="Discount" oninput="calc()"><select id="mDiscType" onchange="calc()" style="width:80px;"><option value="val">£</option><option value="perc">%</option></select></div>
        <div id="mTravelInfo" style="font-size:0.7rem; color:var(--yellow); text-align:right;">Distance: 0 mi</div>
        <div id="mDispTotal" style="font-size:2.8rem; color:var(--green); font-weight:bold; text-align:right; margin:15px 0;">£0.00</div>
        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:8px;">
            <button class="btn-green" id="saveBtn" onclick="saveJob('QUOTE')">SAVE QUOTE</button>
            <button class="btn-blue" onclick="copyQuote()">COPY</button>
            <button class="btn-yellow" onclick="genPDF('QUOTE')">PDF</button>
        </div>
        <button class="btn-gray" style="width:100%; margin-top:10px;" onclick="resetBuilder()">RESET BUILDER</button>
    </div>

    <div id="panel-active" class="view-panel">
        <input type="text" class="search-box" id="boardSearch" placeholder="Search Board..." oninput="render()">
        <div id="active-board"></div>
    </div>

    <div id="panel-history" class="view-panel">
        <div id="historyMasterStats" class="master-only"></div>
        <input type="text" class="search-box" id="historySearch" placeholder="Search History..." oninput="render()">
        <div id="history-board"></div>
    </div>
</div>

<div id="cogModal" class="modal">
    <div class="modal-content">
        <h3 style="color:var(--red); border-bottom:1px solid #333; padding-bottom:10px;">SYSTEM CONTROL</h3>
        <div class="section-title">Hourly rates (£)</div>
        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:8px;">
            <div><label style="font-size:8px;">SRV</label><input type="number" id="rateSrv"></div>
            <div><label style="font-size:8px;">BRK</label><input type="number" id="rateBrk"></div>
            <div><label style="font-size:8px;">MECH</label><input type="number" id="rateMech"></div>
        </div>
        <div class="section-title">Fixed Fees & Travel</div>
        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:8px;">
            <div><label style="font-size:8px;">DIAG</label><input type="number" id="feeDiag"></div>
            <div><label style="font-size:8px;">DPF</label><input type="number" id="feeDpf"></div>
            <div><label style="font-size:8px;">BT1</label><input type="number" id="feeBatt1"></div>
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:8px; margin-top:5px;">
            <div><label style="font-size:8px;">BT2</label><input type="number" id="feeBatt2"></div>
            <div><label style="font-size:8px;">ACC</label><input type="number" id="feeAcc"></div>
            <div><label style="font-size:8px;">OOH</label><input type="number" id="feeOOH"></div>
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:8px; margin-top:5px;">
            <div><label style="font-size:8px;">EMER</label><input type="number" id="feeEm"></div>
            <div><label style="font-size:8px;">ENV</label><input type="number" id="feeEnv"></div>
            <div><label style="font-size:8px;">RAD</label><input type="number" id="setRadius"></div>
        </div>
        <div style="margin-top:5px;"><label style="font-size:8px;">£ / MILE</label><input type="number" id="setTravelRate" step="0.1"></div>
        <div class="section-title">Security</div>
        <input type="password" id="setMPass" placeholder="New Master Pass">
        <input type="password" id="setAPass" placeholder="New Archive Pass">
        <button class="btn-green" onclick="saveSettings()">SAVE ALL SETTINGS</button>
        <button class="btn-red" style="margin-top:10px;" onclick="purgeArchive()">PURGE ALL DATA</button>
        <button class="btn-gray" onclick="closeCog()">CLOSE</button>
    </div>
</div>

<input type="file" id="logoInput" style="display:none" accept="image/*" onchange="handleLogoFile(this)">

<script>
const firebaseConfig = { apiKey: "AIzaSyDSC6LXcxQyBq0Yl42nRMH2GUuOInYL7TU", databaseURL: "https://torq-cymru-default-rtdb.europe-west1.firebasedatabase.app/", projectId: "torq-cymru" };
firebase.initializeApp(firebaseConfig); const db = firebase.database();

let isMaster = false, selectedVan = "", cloudJobs = {}, mPass = "1234", aPass = "9999", curDist = 0, editId = null, logoB64 = "";
let liveRates = { srv: 55, brk: 60, mech: 65 };
let liveFees = { diag: 45, dpf: 65, batt1: 30, batt2: 50 };
let liveSurs = { acc: 10, ooh: 25, em: 50, env: 5, radius: 10, travelRate: 1.50 };

const stdJobs = [{id:"bs",n:"Basic Service",h:0.83,r:55},{id:"fs",n:"Full Service",h:1.25,r:55},{id:"pf",n:"Front Pads",h:0.9,r:60},{id:"pr",n:"Rear Pads",h:1.0,r:60},{id:"pa",n:"Pads (All Round)",h:1.8,r:60},{id:"df",n:"Front Pads & Discs",h:1.3,r:60},{id:"dr",n:"Rear Pads & Discs",h:1.4,r:60},{id:"da",n:"Pads & Discs (All Round)",h:2.5,r:60},{id:"sm",n:"Starter Motor",h:2.2,r:65},{id:"alt",n:"Alternator",h:2.5,r:65},{id:"bt1",n:"Battery (Std)",f:30},{id:"bt2",n:"Battery (S/S)",f:50},{id:"dia",n:"Diagnostics",f:45},{id:"dpf",n:"DPF Regen",f:65}];

function initMasterLogin() { const p = prompt("Master Pass:"); if(p === mPass) { isMaster = true; document.getElementById('appBody').classList.add('is-master'); startApp('Master Control'); } }

function startApp(van) {
    selectedVan = van; document.getElementById('startup-screen').style.display = 'none'; 
    document.getElementById('main-ui').style.display = 'block'; document.getElementById('appHeader').style.display = 'flex';
    db.ref("jobs").on("value", snap => { cloudJobs = snap.val() || {}; render(); });
    db.ref("settings").on("value", snap => {
        const s = snap.val() || {}; 
        mPass = s.mPass || "1234"; aPass = s.aPass || "9999";
        if(s.logo) { 
            logoB64 = s.logo; 
            document.getElementById('appLogo').src = s.logo; 
            document.getElementById('appLogo').style.display = 'block';
            document.getElementById('logoText').style.display = 'none';
        }
        if(s.liveRates) liveRates = s.liveRates; if(s.liveFees) liveFees = s.liveFees; if(s.liveSurs) liveSurs = s.liveSurs;
        syncCogUI();
    });
    if(!isMaster) switchTab('active'); else switchTab('build');
}

function syncCogUI() {
    if(!document.getElementById('rateSrv')) return;
    document.getElementById('rateSrv').value = liveRates.srv; document.getElementById('rateBrk').value = liveRates.brk; document.getElementById('rateMech').value = liveRates.mech;
    document.getElementById('feeDiag').value = liveFees.diag; document.getElementById('feeDpf').value = liveFees.dpf; document.getElementById('feeBatt1').value = liveFees.batt1; document.getElementById('feeBatt2').value = liveFees.batt2;
    document.getElementById('feeAcc').value = liveSurs.acc; document.getElementById('feeOOH').value = liveSurs.ooh; document.getElementById('feeEm').value = liveSurs.em;
    document.getElementById('feeEnv').value = liveSurs.env; document.getElementById('setRadius').value = liveSurs.radius; document.getElementById('setTravelRate').value = liveSurs.travelRate;
}

function saveSettings() {
    const s = {
        liveRates: { srv: parseFloat(document.getElementById('rateSrv').value), brk: parseFloat(document.getElementById('rateBrk').value), mech: parseFloat(document.getElementById('rateMech').value) },
        liveFees: { diag: parseFloat(document.getElementById('feeDiag').value), dpf: parseFloat(document.getElementById('feeDpf').value), batt1: parseFloat(document.getElementById('feeBatt1').value), batt2: parseFloat(document.getElementById('feeBatt2').value) },
        liveSurs: { acc: parseFloat(document.getElementById('feeAcc').value), ooh: parseFloat(document.getElementById('feeOOH').value), em: parseFloat(document.getElementById('feeEm').value), env: parseFloat(document.getElementById('feeEnv').value), radius: parseFloat(document.getElementById('setRadius').value), travelRate: parseFloat(document.getElementById('setTravelRate').value) },
        mPass: document.getElementById('setMPass').value || mPass, aPass: document.getElementById('setAPass').value || aPass, logo: logoB64
    };
    db.ref("settings").update(s).then(() => { alert("Settings Saved."); closeCog(); });
}

function render() {
    const b = document.getElementById('active-board'), h = document.getElementById('history-board');
    if(!b || !h) return;
    const bQ = document.getElementById('boardSearch').value.toUpperCase(), hQ = document.getElementById('historySearch').value.toUpperCase();
    b.innerHTML = ""; h.innerHTML = "";
    let totalRev = 0, jobCount = 0; const todayStr = new Date().toISOString().split('T')[0];
    Object.keys(cloudJobs).sort((x,y)=>cloudJobs[y].ts - cloudJobs[x].ts).forEach(id => {
        const j = cloudJobs[id]; const sStr = `${j.reg} ${j.name} ${j.id}`.toUpperCase();
        if(j.status === 'PAID') {
            totalRev += (j.total || 0); jobCount++;
            if(isMaster && sStr.includes(hQ)) h.innerHTML += buildCard(j, id);
            if(!isMaster && j.dept === selectedVan) {
                const jobDate = new Date(j.paidAt || j.ts).toISOString().split('T')[0];
                if(jobDate === todayStr && sStr.includes(bQ)) b.innerHTML += buildCard(j, id);
            }
        } else {
            if (!isMaster && j.schedDate && j.schedDate > todayStr) return;
            if(!isMaster && (j.status !== 'DISPATCHED' || j.dept !== selectedVan)) return;
            if(sStr.includes(bQ)) b.innerHTML += buildCard(j, id);
        }
    });
    if(isMaster) document.getElementById('historyMasterStats').innerHTML = `<div class="stats-header"><div class="stat-box"><strong>£${totalRev.toFixed(2)}</strong></div><div class="stat-box"><strong>${jobCount} Jobs</strong></div></div>`;
}

function buildCard(j, id) {
    let btns = "";
    if(isMaster) {
        if(j.status === 'QUOTE') btns = `<button class="btn-green" onclick="event.stopPropagation(); acceptWithDate('${id}')">ACCEPT</button><button class="btn-gray" onclick="event.stopPropagation(); editJob('${id}')">EDIT</button>`;
        else if(j.status === 'ACCEPTED') btns = `<button class="btn-yellow" onclick="event.stopPropagation(); takeDeposit('${id}')">DEPOSIT</button><button class="btn-blue" onclick="event.stopPropagation(); dispatchJob('${id}')">DISPATCH</button>`;
        else if(j.status === 'DISPATCHED') btns = `<button class="btn-gray" onclick="event.stopPropagation(); updateStatus('${id}','ACCEPTED')">UNDO DISP</button>`;
        else if(j.status === 'PAID') btns = `<button class="btn-yellow" onclick="event.stopPropagation(); finalInvoiceFlow('${id}')">PDF INVOICE</button><button class="btn-red" onclick="event.stopPropagation(); issueRefund('${id}')">REFUND</button><button class="btn-gray" onclick="event.stopPropagation(); undoPaid('${id}')">UNDO PAID</button>`;
    } else { 
        if(j.status === 'PAID') btns = `<div style="color:var(--green); font-weight:bold; text-align:center;">COMPLETED (${j.payMethod})</div>`;
        else btns = `<button class="btn-blue" onclick="event.stopPropagation(); openMap('${j.addr}', '${j.pcode}')">NAV</button><button class="btn-gray" onclick="event.stopPropagation(); vanAddNote('${id}')">ADD NOTE</button><button class="btn-green" onclick="event.stopPropagation(); vanMarkPaid('${id}')">MARK PAID</button>`; 
    }
    const ukDate = j.schedDate ? j.schedDate.split('-').reverse().join('/') : "TBC";
    const masterBreakdown = `<div style="border-top:1px solid #333; margin-top:10px; padding-top:10px;"><div class="breakdown-row"><span>Labour:</span><span>£${(j.labourVal || 0).toFixed(2)}</span></div><div class="breakdown-row"><span>Parts:</span><span>£${(j.partsVal || 0).toFixed(2)}</span></div>${j.refundVal ? `<div class="breakdown-row" style="color:var(--red)"><span>REFUND:</span><span>-£${j.refundVal.toFixed(2)}</span></div>` : ''}<div class="breakdown-row" style="color:var(--green); font-weight:bold;"><span>TOTAL:</span><span>£${j.total.toFixed(2)}</span></div></div>`;
    return `<div class="job-item status-${j.status}" onclick="this.classList.toggle('is-open')"><div style="display:flex; justify-content:space-between"><strong class="upper">${j.reg}</strong><span>${j.id}</span></div><div style="font-size:0.75rem;">${j.name} | ${ukDate}${j.dept ? `<span class="van-tag">${j.dept.toUpperCase()}</span>` : ''}</div><div class="details-pane"><p><strong>Work:</strong> ${j.services.join(', ')}</p>${j.vanNotes ? `<p style="color:var(--blue); font-size:0.75rem;"><strong>Van:</strong> ${j.vanNotes}</p>` : ''}${isMaster ? masterBreakdown : `<p style="font-weight:bold; color:var(--green);">COLLECT: £${j.total.toFixed(2)}</p>`}<div style="display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-top:10px;">${btns}${isMaster && j.status !== 'PAID' ? `<button class="btn-red" onclick="event.stopPropagation(); deleteJob('${id}')">DEL</button>` : ''}</div></div></div>`;
}

function openMap(addr, pcode) { const q = encodeURIComponent(addr + " " + pcode); window.open("https://www.google.com/maps/dir/?api=1&destination=" + q); }
function vanAddNote(id) { const n = prompt("Add note:"); if(n) { const old = cloudJobs[id].vanNotes ? cloudJobs[id].vanNotes + " | " : ""; db.ref('jobs/'+id).update({ vanNotes: old + n }); } }
function vanMarkPaid(id) { const m = prompt("1:Cash, 2:Card, 3:Transfer"); const methods = {"1":"Cash","2":"Card","3":"Bank Transfer"}; if(methods[m]) db.ref('jobs/'+id).update({ status: 'PAID', payMethod: methods[m], paidAt: Date.now() }); }
function undoPaid(id) { db.ref('jobs/'+id).update({ status: 'DISPATCHED', paidAt: null, payMethod: null }); }
function issueRefund(id) { const amt = prompt("Refund Amount (£):"); if(amt && !isNaN(amt)) { const r = parseFloat(amt); db.ref('jobs/'+id).update({ refundVal: (cloudJobs[id].refundVal || 0) + r, total: cloudJobs[id].total - r }); } }

function finalInvoiceFlow(id) {
    const j = cloudJobs[id]; genHistoryPDF(id); 
    if(j.email) {
        setTimeout(() => {
            const mailLink = document.createElement('a');
            mailLink.href = `mailto:${j.email}?subject=Invoice - ${j.reg}&body=Hi ${j.name}, please find your invoice attached.`;
            mailLink.click();
        }, 1500);
    }
}

function calc() {
    const u = parseFloat(document.getElementById('mUsage').value), s = parseFloat(document.getElementById('mSize').value), t = parseFloat(document.getElementById('mTier').value);
    let labor = 0, activeSurs = [];
    document.querySelectorAll('.j-chk:checked').forEach(c => {
        const j = stdJobs.find(x => x.id === c.value);
        if(j.id === 'dia') labor += liveFees.diag; else if(j.id === 'dpf') labor += liveFees.dpf; else if(j.id === 'bt1') labor += liveFees.batt1; else if(j.id === 'bt2') labor += liveFees.batt2;
        else { let r = (j.r === 60) ? liveRates.brk : (j.r === 65 ? liveRates.mech : liveRates.srv); labor += (j.h * r * s * t); }
    });
    labor += ((parseFloat(document.getElementById('mCustomHours').value)||0) * liveRates.mech * s * t);
    if(curDist > liveSurs.radius) activeSurs.push({n:"Travel Surcharge", v:(curDist-liveSurs.radius)*liveSurs.travelRate});
    if(document.getElementById('mAcc').checked) activeSurs.push({n:"Access Fee", v:liveSurs.acc});
    if(document.getElementById('mOOH').checked) activeSurs.push({n:"Out of Hours Fee", v:liveSurs.ooh});
    if(document.getElementById('mEm').checked) activeSurs.push({n:"Emergency Fee", v:liveSurs.em});
    if(document.getElementById('mEnv').checked) activeSurs.push({n:"Environmental Disposal Fee", v:liveSurs.env});
    const st = activeSurs.reduce((a,b)=>a+b.v, 0); const pts = parseFloat(document.getElementById('mParts').value)||0;
    const sub = (labor + pts + st) * u; const dIn = parseFloat(document.getElementById('mDiscount').value)||0;
    let dV = document.getElementById('mDiscType').value === 'perc' ? (sub * (dIn / 100)) : dIn;
    const fin = (sub - dV);
    document.getElementById('mDispTotal').innerText = "£" + Math.max(0, fin).toFixed(2);
    return { labor: labor * u, parts: pts * u, surchargeTotal: st * u, activeSurs, sub, discount: dV, total: fin, rawDisc: dIn, dType: document.getElementById('mDiscType').value };
}

function saveJob(stat) {
    const v = calc(); const ref = editId || "TQ-" + Math.floor(1000 + Math.random() * 8999);
    const svcs = Array.from(document.querySelectorAll('.j-chk:checked')).map(c => stdJobs.find(x => x.id === c.value).n);
    const surs = { acc: document.getElementById('mAcc').checked, ooh: document.getElementById('mOOH').checked, em: document.getElementById('mEm').checked, env: document.getElementById('mEnv').checked };
    db.ref("jobs/"+ref).update({ id:ref, status: editId ? cloudJobs[editId].status : stat, name:document.getElementById('mCust').value, phone:document.getElementById('mPhone').value, email:document.getElementById('mEmail').value, reg:document.getElementById('mReg').value.toUpperCase(), make:document.getElementById('mMake').value, pcode:document.getElementById('mPcode').value.toUpperCase(), addr:document.getElementById('mAddr').value, notes: document.getElementById('mOfficeNotes').value, total: v.total, labourVal: v.labor, partsVal: v.parts, surchargeTotal: v.surchargeTotal, activeSurs: v.activeSurs, discVal: v.discount, services:svcs, ts: editId ? cloudJobs[editId].ts : Date.now(), surchargeData: surs, discInput: v.rawDisc, discType: v.dType, schedDate: editId ? (cloudJobs[editId].schedDate || "") : "" }); 
    alert("Synced."); if(editId) { resetBuilder(); switchTab('active'); }
}

function genPDF(type = 'RECORD') {
    const { jsPDF } = window.jspdf; const doc = new jsPDF(); const v = calc(); const reg = document.getElementById('mReg').value.toUpperCase() || "JOB";
    if(logoB64) { try { doc.addImage(logoB64, 'JPEG', 85, 10, 40, 40); } catch(e) {} }
    doc.setFontSize(22); doc.setTextColor(200, 16, 46); doc.text("TORQ CYMRU", 105, 60, { align: "center" });
    doc.setFontSize(10); doc.setTextColor(100); doc.text(type === 'QUOTE' ? "OFFICIAL QUOTATION" : "OFFICIAL SERVICE RECORD", 105, 68, { align: "center" });
    doc.setFontSize(12); doc.setTextColor(0); doc.text(`CLIENT: ${document.getElementById('mCust').value}`, 20, 85); doc.text(`REG: ${reg}`, 20, 92);
    doc.text(`DATE: ${new Date().toLocaleDateString('en-GB')}`, 140, 85); doc.text(`ID: TQ-${Math.floor(1000 + Math.random() * 9000)}`, 140, 92);
    let y = 125; document.querySelectorAll('.j-chk:checked').forEach(c => { doc.text(`- ${stdJobs.find(x=>x.id===c.value).n}`, 25, y); y += 7; });
    doc.text(`TOTAL: £${Math.max(0, v.total).toFixed(2)}`, 190, y+10, { align: "right" });
    doc.save(`TQ_DOC_${reg}.pdf`);
}

function genHistoryPDF(id) {
    const j = cloudJobs[id]; const { jsPDF } = window.jspdf; const doc = new jsPDF();
    if(logoB64) { try { doc.addImage(logoB64, 'JPEG', 85, 10, 40, 40); } catch(e) {} }
    doc.setFontSize(22); doc.setTextColor(200, 16, 46); doc.text("TORQ CYMRU", 105, 60, { align: "center" });
    doc.setFontSize(12); doc.setTextColor(0); doc.text(`CLIENT: ${j.name}`, 20, 85); doc.text(`REG: ${j.reg}`, 20, 92);
    let y = 125; j.services.forEach(s => { doc.text(`- ${s}`, 25, y); y += 7; });
    doc.text(`TOTAL PAID: £${j.total.toFixed(2)}`, 190, y+10, { align: "right" });
    doc.save(`TQ_INVOICE_${j.reg}.pdf`);
}

function triggerLogoUpload() { if(isMaster) document.getElementById('logoInput').click(); }
function handleLogoFile(input) { const reader = new FileReader(); reader.onload = (e) => { const img = new Image(); img.onload = () => { const canvas = document.createElement('canvas'); const maxW = 300; canvas.width = maxW; canvas.height = img.height * (maxW / img.width); canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height); logoB64 = canvas.toDataURL('image/jpeg', 0.7); db.ref("settings/logo").set(logoB64); document.getElementById('appLogo').src = logoB64; document.getElementById('appLogo').style.display = 'block'; document.getElementById('logoText').style.display = 'none'; }; img.src = e.target.result; }; reader.readAsDataURL(input.files[0]); }
function handleDistance() { const pc = document.getElementById('mPcode').value.toUpperCase(); if(pc.length < 5) return; fetch(`https://api.postcodes.io/postcodes/${pc}`).then(r=>r.json()).then(d=>{ if(d.status === 200) { const R = 3958.8; const la1 = 51.5761, lo1 = -3.2173; const dLat = (d.result.latitude-la1)*Math.PI/180; const dLon = (d.result.longitude-lo1)*Math.PI/180; const a = Math.sin(dLat/2)**2 + Math.cos(la1*Math.PI/180)*Math.cos(d.result.latitude*Math.PI/180)*Math.sin(dLon/2)**2; curDist = 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); document.getElementById('mTravelInfo').innerText = `Distance: ${curDist.toFixed(1)} mi`; calc(); }});}
function switchTab(t) { if(t !== 'build') editId = null; document.querySelectorAll('.view-panel, .tab').forEach(p => p.classList.remove('active')); document.getElementById('panel-'+t).classList.add('active'); document.getElementById('tab-'+t).classList.add('active'); render(); }
function updateStatus(id, s) { db.ref('jobs/'+id).update({status: s}); }
function acceptWithDate(id) { const d = prompt("DD/MM/YYYY:", new Date().toLocaleDateString('en-GB')); if(d) { const p = d.split('/'); if(p.length === 3) db.ref('jobs/'+id).update({ status: 'ACCEPTED', schedDate: `${p[2]}-${p[1]}-${p[0]}` }); } }
function editJob(id) { const j = cloudJobs[id]; editId = id; switchTab('build'); document.getElementById('mCust').value = j.name; document.getElementById('mPhone').value = j.phone; document.getElementById('mEmail').value = j.email || ""; document.getElementById('mReg').value = j.reg; document.getElementById('mMake').value = j.make || ""; document.getElementById('mPcode').value = j.pcode || ""; document.getElementById('mAddr').value = j.addr || ""; document.getElementById('mOfficeNotes').value = j.notes || ""; document.getElementById('mParts').value = j.partsVal || ""; document.querySelectorAll('.j-chk').forEach(c => { const jobName = stdJobs.find(x => x.id === c.value).n; c.checked = j.services.includes(jobName); }); calc(); }
function purgeArchive() { const p = prompt("Archive Pass:"); if(p === aPass) { if(confirm("Delete all?")) db.ref("jobs").remove(); closeCog(); } }
function openCog() { document.getElementById('cogModal').style.display='flex'; syncCogUI(); }
function closeCog() { document.getElementById('cogModal').style.display='none'; }
function resetBuilderUI() { document.querySelectorAll('input, textarea').forEach(i => { if(i.type==='checkbox') i.checked=false; else i.value=''; }); document.getElementById('mUsage').value = "1"; document.getElementById('mSize').value = "1.0"; document.getElementById('mTier').value = "1.0"; document.getElementById('mDiscType').value = "val"; }
function resetBuilder() { editId = null; document.getElementById('saveBtn').innerText = "SAVE QUOTE"; resetBuilderUI(); curDist = 0; calc(); }
function copyQuote() { const v = calc(); const t = `TORQ CYMRU\nReg: ${document.getElementById('mReg').value.toUpperCase()}\nWork: ${Array.from(document.querySelectorAll('.j-chk:checked')).map(c=>stdJobs.find(x=>x.id===c.value).n).join(', ')}\nTOTAL: £${v.total.toFixed(2)}`; const el = document.createElement('textarea'); el.value = t; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el); alert("Copied."); }
function takeDeposit(id) { const amt = prompt("Amount (£):"); if(amt && !isNaN(amt)) db.ref('jobs/'+id).update({ deposit: parseFloat(amt), total: (cloudJobs[id].total - parseFloat(amt)) }); }
function dispatchJob(id) { const v = prompt("1:M1, 2:M2, 3:Tyre, 4:Lock, 5:Rec"); const depts = {"1":"Mechanic 1","2":"Mechanic 2","3":"Tyres","4":"Locksmith","5":"Recovery"}; if(depts[v]) db.ref('jobs/'+id).update({ status: 'DISPATCHED', dept: depts[v] }); }
function deleteJob(id) { if(confirm('Delete?')) db.ref('jobs/'+id).remove(); }

window.onload = () => { 
    const grid = document.getElementById('mGrid'); 
    stdJobs.forEach(j => grid.innerHTML += `<label class="job-card"><input type="checkbox" class="j-chk" value="${j.id}" onchange="calc()"> ${j.n}</label>`); 
};
